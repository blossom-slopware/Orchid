name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-26

    permissions:
      contents: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Preflight – verify secrets and permissions
        env:
          HOMEBREW_REPO_TOKEN: ${{ secrets.HOMEBREW_REPO_TOKEN }}
        run: |
          # 1. HOMEBREW_REPO_TOKEN must be set
          if [ -z "${HOMEBREW_REPO_TOKEN}" ]; then
            echo "::error::HOMEBREW_REPO_TOKEN secret is not set"
            exit 1
          fi

          # 2. Token can authenticate with GitHub API
          HTTP_CODE=$(curl -s -o /tmp/gh_response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${HOMEBREW_REPO_TOKEN}" \
            https://api.github.com/user)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::HOMEBREW_REPO_TOKEN failed GitHub auth (HTTP $HTTP_CODE)"
            cat /tmp/gh_response.json
            exit 1
          fi
          echo "Token authenticated as: $(jq -r .login /tmp/gh_response.json)"

          # 3. Token has push access to the homebrew tap repo
          HTTP_CODE=$(curl -s -o /tmp/gh_repo.json -w '%{http_code}' \
            -H "Authorization: Bearer ${HOMEBREW_REPO_TOKEN}" \
            https://api.github.com/repos/blossom-slopware/homebrew-orchid)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cannot access blossom-slopware/homebrew-orchid (HTTP $HTTP_CODE)"
            cat /tmp/gh_repo.json
            exit 1
          fi
          PUSH_PERM=$(jq -r '.permissions.push // false' /tmp/gh_repo.json)
          if [ "$PUSH_PERM" != "true" ]; then
            echo "::error::Token does not have push permission on homebrew-orchid (permissions: $(jq -c .permissions /tmp/gh_repo.json))"
            exit 1
          fi
          echo "Push permission on homebrew-orchid: OK"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get ocr-inference commit hash
        id: ocr_commit
        run: echo "hash=$(git rev-parse HEAD:ocr-inference)" >> "$GITHUB_OUTPUT"

      - name: Cache glm-ocr-server binary and metallib
        id: cache_binary
        uses: actions/cache@v4
        with:
          path: |
            ocr-inference/target/release/glm-ocr-server
            ocr-inference/target/release/mlx.metallib
          key: glm-ocr-server-${{ steps.ocr_commit.outputs.hash }}

      - name: Install Rust toolchain
        if: steps.cache_binary.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        if: steps.cache_binary.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('ocr-inference/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build glm-ocr-server (release)
        if: steps.cache_binary.outputs.cache-hit != 'true'
        run: |
          cargo build --release \
            --manifest-path ocr-inference/Cargo.toml \
            -p glm-ocr-server

          # Copy metallib to a stable path for caching
          METALLIB=$(find ocr-inference/target/release/build -name "mlx.metallib" -type f | head -1)
          cp "$METALLIB" ocr-inference/target/release/mlx.metallib
        env:
          CARGO_INCREMENTAL: "0"

      - name: Build Orchid.app (Release)
        run: |
          xcodebuild \
            -project Orchid.xcodeproj \
            -scheme Orchid \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/build/Release" \
            build

      - name: Embed glm-ocr-server and metallib into app bundle
        run: |
          BIN_DIR="$GITHUB_WORKSPACE/build/Release/Orchid.app/Contents/Resources/bin"
          mkdir -p "$BIN_DIR"
          cp ocr-inference/target/release/glm-ocr-server "$BIN_DIR/"
          cp ocr-inference/target/release/mlx.metallib "$BIN_DIR/"
          chmod +x "$BIN_DIR/glm-ocr-server"

      - name: Ad-hoc sign app bundle
        run: |
          codesign --deep --force --sign "-" \
            "$GITHUB_WORKSPACE/build/Release/Orchid.app"

      - name: Package into zip
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="Orchid-${VERSION}.zip"
          cd "$GITHUB_WORKSPACE/build/Release"
          zip -qr "$GITHUB_WORKSPACE/build/${ZIP_NAME}" Orchid.app
          SHA256="$(shasum -a 256 "$GITHUB_WORKSPACE/build/${ZIP_NAME}" | awk '{print $1}')"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_path=$GITHUB_WORKSPACE/build/${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_path }}
          generate_release_notes: true

      - name: Update homebrew-orchid cask
        env:
          HOMEBREW_REPO_TOKEN: ${{ secrets.HOMEBREW_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.package.outputs.sha256 }}"

          git clone \
            "https://x-access-token:${HOMEBREW_REPO_TOKEN}@github.com/blossom-slopware/homebrew-orchid.git" \
            /tmp/homebrew-orchid

          cd /tmp/homebrew-orchid

          # Update version and sha256 in orchid.rb
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/orchid.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/orchid.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/orchid.rb
          git commit -m "Update orchid to ${VERSION}"
          git push "https://x-access-token:${HOMEBREW_REPO_TOKEN}@github.com/blossom-slopware/homebrew-orchid.git" HEAD:main
